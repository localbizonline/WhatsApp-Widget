name = "whatsapp-widget"
main = "src/index.js"
compatibility_date = "2024-01-01"
workers_dev = true

routes = [
  { pattern = "widget.reachmax.app/*", zone_name = "reachmax.app" },
  { pattern = "generator.reachmax.app/*", zone_name = "reachmax.app" }
]

[[rules]]
type = "Text"
globs = ["**/*.txt", "**/*.html"]

[[r2_buckets]]
binding = "WIDGET_ASSETS"
bucket_name = "widget-assets"

# AIRTABLE_TOKEN must be set as a secret:
# npx wrangler secret put AIRTABLE_TOKEN
